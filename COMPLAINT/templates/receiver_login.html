{% extends "base.html" %}
{% block title %}Receiver Login{% endblock %}

{% block content %}
  <section class="w-full max-w-md mx-auto bg-zinc-900 border border-white/10 rounded-xl shadow-sm overflow-hidden">
    <div class="p-6 sm:p-8 space-y-5">
      <div>
        <h1 class="text-2xl font-semibold text-zinc-100">Receiver login</h1>
        <p class="text-sm text-zinc-400 mt-1">Enter the receiver password to view complaints.</p>
      </div>
      <form method="post" action="{{ url_for('receiver_login_post') }}" class="space-y-4">
        <div class="space-y-1">
          <label for="password" class="block text-sm font-medium text-zinc-300">Password</label>
          <input id="password" name="password" type="password" required class="w-full px-3 py-2 bg-zinc-950/50 border border-white/10 rounded-md text-zinc-100 focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500" />
        </div>
        <button type="submit" class="w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 text-sm font-medium text-white bg-indigo-600 rounded-md hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/60">Login</button>
      </form>
    </div>
  </section>
{% endblock %}
